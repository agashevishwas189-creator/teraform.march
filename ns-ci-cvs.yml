apiVersion: v1 
kind: Namespace
metadata:
    name: nsci

---
apiVersion: v1 
kind: Pod
metadata: 
     name: ns-pod
     namespace: nsci
     labels: 
       app: ns-all
spec: 
  containers:
     - name: ns-container
       image: httpd:latest
       ports:
        - containerPort: 80  
---

apiVersion: v1 
kind: Service
metadata:
    name: nsci-service
    namespace: nsci
    labels:
      app: ns-all
spec:
  type: ClusterIP
  selector:
      app: ns-all
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80 
---
apiVersion: v1  
kind: Service
metadata:
    name: nodeport
    namespace: nsci
    labels:
      app: ns-all
spec:
  type: NodePort
  selector:
      app: ns-all     
  ports:
   - protocol: TCP
     port: 80
     targetPort: 80
---
apiVersion: v1  
kind: Service 
metadata:
    name: loadbalancer
    namespace: nsci
    labels:
      app: ns-all
spec:
  type: LoadBalancer
  selector:
      app: ns-all     
  ports:
   - protocol: TCP
     port: 80
     targetPort: 80
# kubectl apply -f ns-ci-cvs.yml - to create the namespace, pod and services
#kubectl get ns - to get the namespaces in the cluster
#kubectl get pods -n nsci - to get the pods in the namespace nsci 




      